services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw-stock-advisor
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-default_token}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # 持久化 OpenClaw 配置 (Session, Auth 等)
      - ./openclaw-data:/root/.openclaw
      # 掛載您的股票預測系統原始碼
      - /Users/kelvin/Kelvin-WorkSpace/Stock-Prediction-System:/app/workspace/Stock-Prediction-System
    ports:
      - "18789:18789"
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  default:
    name: stock-net
